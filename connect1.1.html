<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>局域网极速传</title>
    <style>
        body { font-family: system-ui; max-width: 600px; margin: 0 auto; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .config { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        #chat-box { height: 400px; overflow-y: auto; border: 1px solid #eee; padding: 10px; margin-bottom: 20px; background: #fafafa; }
        .message { margin-bottom: 15px; padding: 10px; background: #e3f2fd; border-radius: 8px; }
        .file-msg { background: #e8f5e9; }
        .file-link { color: #2e7d32; font-weight: bold; text-decoration: none; }
        /* 新增进度条样式 */
        #progress-container {
            display: none; /* 默认隐藏 */
            margin-bottom: 20px;
        }

        progress {
            width: 100%;
            height: 20px;
            border-radius: 5px;
        }

        #progress-text {
            font-size: 14px;
            color: #555;
            margin-top: 5px;
            text-align: right;
        }
    </style>
</head>
<body>



<div class="card">
    <h2>🔗 连接到服务器</h2>
    <div class="config">
        <input type="text" id="ip-input" placeholder="输入服务器IP (例如: 192.168.1.100)">
        <button id="connect-btn" onclick="connectServer()">连接</button>
    </div>

    <div class="card">
        <h2>🔍 寻找局域网服务器</h2>
        <div class="config">
            <input type="text" id="subnet-input" value="192.168.1" placeholder="输入网段 (如 192.168.1)">
            <button id="scan-btn" onclick="scanNetwork()">全网段扫描</button>
        </div>
        <div id="server-list" style="margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px;"></div>
    </div>

    <div id="history-box" style="margin-bottom: 20px; font-size: 14px; display: none;">
        <span style="color: #666;">最近连接: </span>
        <span id="history-list"></span>
    </div>


    <div id="chat-box"></div>

    <div class="config">
        <input type="text" id="msg-input" placeholder="输入文字消息...">
        <button onclick="sendText()">发送文字</button>
    </div>

    <div class="config">
        <input type="file" id="file-input">
        <button id="upload-btn" onclick="uploadFile()">发送大文件</button>
    </div>

    <div id="progress-container">
        <progress id="progress-bar" value="0" max="100"></progress>
        <div id="progress-text">0%</div>
    </div>


</div>

<script>
    let ws = null;
    let serverIP = "";

    // 局域网服务器扫描主函数
    async function scanNetwork() {
        const subnet = document.getElementById('subnet-input').value.trim();
        if (!subnet) return alert("请输入网段！");

        const serverList = document.getElementById('server-list');
        const scanBtn = document.getElementById('scan-btn');

        // 初始化扫描状态
        serverList.innerHTML = "<div style='color: #666;'>📡 正在向 254 个 IP 发射探测信号，请稍候...</div>";
        scanBtn.disabled = true;
        scanBtn.innerText = "扫描中...";

        const foundServers = [];
        const promises = [];

        // 核心：并发发起 254 个 IP 探测请求 (xxx.xxx.xxx.1 到 254)
        for (let i = 1; i <= 254; i++) {
            const ip = `${subnet}.${i}`;
            promises.push(pingServer(ip, foundServers));
        }

        // 等待所有探测请求完成（无论成功/超时）
        await Promise.allSettled(promises);

        // 渲染扫描结果列表
        serverList.innerHTML = "";
        if (foundServers.length === 0) {
            serverList.innerHTML = "<div style='color: red;'>❌ 未找到服务器，请确认网段是否正确，或检查服务器防火墙设置。</div>";
        } else {
            foundServers.forEach(server => {
                const btn = document.createElement('button');
                btn.style.cssText = "background: #28a745; color: white; padding: 10px; border-radius: 8px; text-align: left;";
                btn.innerHTML = `💻 <b>${server.name}</b> <br><span style="font-size: 12px; color: #e8e8e8;">IP: ${server.ip}</span>`;

                // 点击服务器按钮自动连接
                btn.onclick = () => connectServer(server.ip);
                serverList.appendChild(btn);
            });
        }

        // 恢复按钮状态
        scanBtn.disabled = false;
        scanBtn.innerText = "重新扫描";
    }

    // 探测单个 IP 地址的服务器是否存活
    async function pingServer(ip, foundServers) {
        // 设置 800ms 超时，避免请求阻塞
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 2500);

        try {
            const response = await fetch(`http://${ip}:8000/ping`, {
                signal: controller.signal,
                mode: 'cors'
            });

            if (response.ok) {
                const data = await response.json();
                // 记录存活的服务器信息
                foundServers.push({ ip: ip, name: data.server_name });
            }
        } catch (e) {
            // 请求超时/连接拒绝，忽略该 IP
        } finally {
            clearTimeout(timeoutId);
        }
    }

    // 【新增】：页面加载时自动读取历史记录
    window.onload = () => {
        loadHistory();
    };

    // 【新增】：加载并渲染历史记录按钮
    function loadHistory() {
        // 从浏览器本地缓存读取，如果没有则默认为空数组
        const history = JSON.parse(localStorage.getItem('lan_sync_ips') || '[]');
        const historyBox = document.getElementById('history-box');
        const historyList = document.getElementById('history-list');
        
        if (history.length > 0) {
            historyBox.style.display = 'block';
            historyList.innerHTML = ''; // 清空重新渲染
            
            history.forEach(ip => {
                const btn = document.createElement('button');
                btn.innerText = ip;
                // 让按钮看起来像个小标签
                btn.style.cssText = "margin: 0 5px; padding: 3px 8px; background: #e0e0e0; color: #333; border-radius: 12px; font-size: 12px;";
                
                // 点击历史 IP，自动填入并尝试连接
                btn.onclick = () => {
                    document.getElementById('ip-input').value = ip;
                    connectServer();
                };
                historyList.appendChild(btn);
            });
        }
    }

    // 【新增】：保存成功连接的 IP
    function saveHistory(ip) {
        let history = JSON.parse(localStorage.getItem('lan_sync_ips') || '[]');
        // 如果这个 IP 还没存过，就插到最前面
        if (!history.includes(ip)) {
            history.unshift(ip);
            // 限制最多只存最近的 3 个历史 IP，控制界面整洁
            if (history.length > 3) history.pop(); 
            localStorage.setItem('lan_sync_ips', JSON.stringify(history));
            loadHistory(); // 刷新界面
        }
    }

    // 【修改】：原本的连接逻辑
    function connectServer(ip) {
        // 检查是否已有活跃连接
        if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
            return alert("⚠️ 已经连接上了，不要重复点击哦！");
        }

        serverIP = ip;
        ws = new WebSocket(`ws://${serverIP}:8000/ws`);

        // 连接成功回调
        ws.onopen = () => {
            alert(`✅ 成功连接到服务器: ${serverIP}`);
            document.getElementById('server-list').innerHTML = `<div style="color: green; font-weight: bold;">✅ 当前已连接: ${serverIP}</div>`;
        };

        
        ws.onmessage = (event) => {
            const res = JSON.parse(event.data);
            if (res.type === "history") {
                document.getElementById('chat-box').innerHTML = ""; 
                res.data.forEach(renderMessage);
            } else if (res.type === "new_message") {
                renderMessage(res.data);
                const chatBox = document.getElementById('chat-box');
                while (chatBox.children.length > 10) {
                    chatBox.removeChild(chatBox.firstChild);
                }
            }
        };
    }

    function renderMessage(msg) {
        const chatBox = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `message ${msg.msg_type === 'file' ? 'file-msg' : ''}`;
        
        if (msg.msg_type === 'text') {
            div.innerText = `💬: ${msg.content}`;
        } else if (msg.msg_type === 'file') {
            const url = `http://${serverIP}:8000${msg.download_url}`;
            div.innerHTML = `📁: ${msg.filename} <br><a class="file-link" href="${url}" target="_blank">⬇️ 点击下载</a>`;
        }
        
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight; // 自动滚动到底部
    }

    function sendText() {
        if (!ws || ws.readyState !== WebSocket.OPEN) return alert("请先连接服务器！");
        const input = document.getElementById('msg-input');
        if (input.value) {
            ws.send(input.value); // WebSocket 直接发文本
            input.value = "";
        }
    }

    function uploadFile() {
        if (!serverIP) return alert("请先连接服务器！");

        const fileInput = document.getElementById('file-input');
        const file = fileInput.files[0];
        if (!file) return alert("请先选择一个文件！");

        const formData = new FormData();
        formData.append("file", file);

        const btn = document.getElementById('upload-btn');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');

        // 1. 准备上传 UI
        btn.innerText = "上传中...";
        btn.disabled = true;
        progressContainer.style.display = 'block';
        progressBar.value = 0;
        progressText.innerText = "0%";

        // 2. 使用 XMLHttpRequest 替代 fetch 以获取进度
        const xhr = new XMLHttpRequest();
        xhr.open('POST', `http://${serverIP}:8000/upload`, true);

        // 3. 监听上传进度事件 (核心魔法)
        xhr.upload.onprogress = function(event) {
            if (event.lengthComputable) {
                // 计算百分比
                const percentComplete = Math.round((event.loaded / event.total) * 100);
                progressBar.value = percentComplete;
                progressText.innerText = `${percentComplete}% (已传输: ${(event.loaded / 1024 / 1024).toFixed(1)} MB)`;
            }
        };

        // 4. 上传成功的回调
        xhr.onload = function() {
            if (xhr.status === 200) {
                fileInput.value = ""; // 清空文件选择器
                progressText.innerText = "✅ 上传完成！服务器正在广播...";

                // 延迟 2 秒后隐藏进度条，恢复界面
                setTimeout(() => {
                    progressContainer.style.display = 'none';
                    progressBar.value = 0;
                    btn.innerText = "发送大文件";
                    btn.disabled = false;
                }, 2000);
            } else {
                alert("❌ 上传失败，服务器返回状态码：" + xhr.status);
                resetUploadUI();
            }
        };

        // 5. 网络错误的回调
        xhr.onerror = function() {
            alert("❌ 网络出错，请检查连接！");
            resetUploadUI();
        };

        // 6. 正式发送数据
        xhr.send(formData);

        // 辅助函数：恢复按钮状态
        function resetUploadUI() {
            btn.innerText = "发送大文件";
            btn.disabled = false;
            progressContainer.style.display = 'none';
        }
    }
</script>

</body>
</html>

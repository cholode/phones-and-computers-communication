<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>局域网极速传</title>
  <style>
    /* 全局样式 */
    body {
      font-family: system-ui;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background: #f4f4f9;
    }

    /* 卡片容器 */
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    /* 配置行布局 */
    .config {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    /* 输入框样式 */
    input[type="text"] {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    /* 按钮样式 */
    button {
      padding: 10px 15px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    /* 聊天框样式 */
    #chat-box {
      height: 400px;
      overflow-y: auto;
      border: 1px solid #eee;
      padding: 10px;
      margin-bottom: 20px;
      background: #fafafa;
    }

    /* 消息样式 */
    .message {
      margin-bottom: 15px;
      padding: 10px;
      background: #e3f2fd;
      border-radius: 8px;
    }

    .file-msg {
      background: #e8f5e9;
    }

    .file-link {
      color: #2e7d32;
      font-weight: bold;
      text-decoration: none;
    }

    /* 进度条容器 */
    #progress-container {
      display: none;
      margin-bottom: 20px;
    }

    progress {
      width: 100%;
      height: 20px;
      border-radius: 5px;
    }

    #progress-text {
      font-size: 14px;
      color: #555;
      margin-top: 5px;
      text-align: right;
    }

    /* 搜索结果盒 */
    #search-results-box {
      display: none;
      height: 400px;
      overflow-y: auto;
      border: 2px dashed #ff9800;
      padding: 10px;
      margin-bottom: 20px;
      background: #fffde7;
      border-radius: 8px;
    }

    /* 关键词高亮 */
    .highlight {
      background-color: #ffeb3b;
      color: #d32f2f;
      font-weight: bold;
      padding: 0 2px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>🔗 连接到服务器</h2>
    <div class="config">
      <input type="text" id="ip-input" placeholder="输入服务器IP (例如: 192.168.1.100)">
      <button id="connect-btn" onclick="connectServer()">连接</button>
    </div>
  </div>

  <div class="card">
    <h2>🔍 寻找局域网服务器</h2>
    <div class="config">
      <input type="text" id="subnet-input" value="192.168.1" placeholder="输入网段 (如 192.168.1)">
      <button id="scan-btn" onclick="scanNetwork()">全网段扫描</button>
    </div>
    <div id="server-list" style="margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px;"></div>
  </div>

  <div id="history-box" style="margin-bottom: 20px; font-size: 14px; display: none;">
    <span style="color: #666;">最近连接: </span>
    <span id="history-list"></span>
  </div>

  <div class="config" style="margin-bottom: 10px;">
    <input type="text" id="search-input" placeholder="🔍 搜索聊天记录或文件名称..." oninput="debouncedSearch(event)">
  </div>

  <div id="search-results-box"></div>
  <div id="chat-box"></div>

  <div class="config">
    <input type="text" id="msg-input" placeholder="输入文字消息...">
    <button onclick="sendText()">发送文字</button>
  </div>

  <div class="config">
    <input type="file" id="file-input">
    <button id="upload-btn" onclick="uploadFile()">发送大文件</button>
  </div>

  <div id="progress-container">
    <progress id="progress-bar" value="0" max="100"></progress>
    <div id="progress-text">0%</div>
  </div>

  <script>
    // ================= 全局核心变量 =================
    let ws = null;
    let serverIP = "";
    const SERVER_PORT = "8080"; // 统一端口网关，拒绝硬编码

    // ================= 生命周期钩子 (完美合并) =================
    window.onload = () => {
      const hostIp = window.location.hostname;
      const ipInput = document.getElementById('ip-input');
      const subnetInput = document.getElementById('subnet-input');

      // 极其智能的环境推断
      if (hostIp && hostIp !== 'localhost' && hostIp !== '127.0.0.1' && hostIp !== '') {
        ipInput.value = hostIp;
        const subnet = hostIp.split('.').slice(0, 3).join('.');
        subnetInput.value = subnet;
        console.log(`📡 自动锁定宿主机 IP: ${hostIp}，发起极速握手...`);
        connectServer(hostIp); // 自动触发连接
      }

      loadHistory(); // 渲染历史连接缓存
    };

    // ================= 历史记录状态管理 =================
    function loadHistory() {
      const history = JSON.parse(localStorage.getItem('lan_sync_ips') || '[]');
      const historyBox = document.getElementById('history-box');
      const historyList = document.getElementById('history-list');

      if (history.length > 0) {
        historyBox.style.display = 'block';
        historyList.innerHTML = '';

        history.forEach(ip => {
          const btn = document.createElement('button');
          btn.innerText = ip;
          btn.style.cssText = "margin: 0 5px; padding: 3px 8px; background: #e0e0e0; color: #333; border-radius: 12px; font-size: 12px;";
          btn.onclick = () => {
            document.getElementById('ip-input').value = ip;
            connectServer();
          };
          historyList.appendChild(btn);
        });
      }
    }

    // 补齐极其关键的 saveHistory 函数
    function saveHistory(ip) {
      let history = JSON.parse(localStorage.getItem('lan_sync_ips') || '[]');
      if (!history.includes(ip)) {
        history.unshift(ip);
        if (history.length > 3) history.pop();
        localStorage.setItem('lan_sync_ips', JSON.stringify(history));
        loadHistory();
      }
    }

    // ================= 核心网络通讯 =================
    function connectServer(ip) {
      const targetIP = ip || document.getElementById('ip-input').value.trim();
      if (!targetIP) return alert("❌ 请输入或选择服务器 IP！");

      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
        return alert("⚠️ 已经连接上了，不要重复点击哦！");
      }

      serverIP = targetIP;
      ws = new WebSocket(`ws://${serverIP}:${SERVER_PORT}/ws`);

      ws.onopen = () => {
        console.log(`✅ 成功连接到服务器: ${serverIP}`);
        document.getElementById('server-list').innerHTML = `<div style="color: green; font-weight: bold;">✅ 当前已连接: ${serverIP}</div>`;
        saveHistory(serverIP); // 这一步再也不会报错了！
      };

      ws.onmessage = (event) => {
        const res = JSON.parse(event.data);
        if (res.type === "history") {
          document.getElementById('chat-box').innerHTML = "";
          res.data.forEach(renderMessage);
        } else if (res.type === "new_message") {
          renderMessage(res.data);
          const chatBox = document.getElementById('chat-box');
          while (chatBox.children.length > 10) {
            chatBox.removeChild(chatBox.firstChild);
          }
        }
      };

      ws.onerror = (error) => {
        console.error("WebSocket 连接碎裂:", error);
        alert("❌ WebSocket 连接碎裂！请检查后端网关是否存活。");
      };
    }

    function renderMessage(msg) {
      const chatBox = document.getElementById('chat-box');
      const div = document.createElement('div');
      div.className = `message ${msg.msg_type === 'file' ? 'file-msg' : ''}`;

      if (msg.msg_type === 'text') {
        div.innerText = `💬: ${msg.content}`;
      } else if (msg.msg_type === 'file') {
        const url = `http://${serverIP}:${SERVER_PORT}${msg.download_url}`;
        div.innerHTML = `📁: ${msg.filename} <br><a class="file-link" href="${url}" target="_blank">⬇️ 点击下载</a>`;
      }

      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function sendText() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return alert("请先连接服务器！");
      const input = document.getElementById('msg-input');
      if (input.value) {
        ws.send(input.value);
        input.value = "";
      }
    }

    // ================= 大文件流式上传引擎 =================
    function uploadFile() {
      if (!serverIP) return alert("请先连接服务器！");
      const fileInput = document.getElementById('file-input');
      const file = fileInput.files[0];
      if (!file) return alert("请先选择一个文件！");

      const formData = new FormData();
      formData.append("file", file);

      const btn = document.getElementById('upload-btn');
      const progressContainer = document.getElementById('progress-container');
      const progressBar = document.getElementById('progress-bar');
      const progressText = document.getElementById('progress-text');

      // 初始化上传UI
      btn.innerText = "上传中...";
      btn.disabled = true;
      progressContainer.style.display = 'block';
      progressBar.value = 0;
      progressText.innerText = "0%";

      // 创建XHR请求
      const xhr = new XMLHttpRequest();
      xhr.open('POST', `http://${serverIP}:${SERVER_PORT}/upload`, true);

      // 监听上传进度
      xhr.upload.onprogress = function(event) {
        if (event.lengthComputable) {
          const percentComplete = Math.round((event.loaded / event.total) * 100);
          progressBar.value = percentComplete;
          progressText.innerText = `${percentComplete}% (已传输: ${(event.loaded / 1024 / 1024).toFixed(1)} MB)`;
        }
      };

      // 上传完成回调
      xhr.onload = function() {
        if (xhr.status === 200) {
          fileInput.value = "";
          progressText.innerText = "✅ 上传完成！服务器正在广播...";
          setTimeout(() => {
            progressContainer.style.display = 'none';
            progressBar.value = 0;
            btn.innerText = "发送大文件";
            btn.disabled = false;
          }, 2000);
        } else {
          alert("❌ 上传失败，状态码：" + xhr.status);
          resetUploadUI();
        }
      };

      // 网络错误回调
      xhr.onerror = function() {
        alert("❌ 网络出错，请检查连接！");
        resetUploadUI();
      };

      // 发送请求
      xhr.send(formData);

      // 恢复UI状态辅助函数
      function resetUploadUI() {
        btn.innerText = "发送大文件";
        btn.disabled = false;
        progressContainer.style.display = 'none';
      }
    }

    // ================= 防抖高级检索引擎 =================
    function debounce(func, wait) {
      let timeout;
      return function(...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), wait);
      };
    }

    async function performSearch(keyword) {
      const chatBox = document.getElementById('chat-box');
      const searchBox = document.getElementById('search-results-box');

      // 清空搜索框时恢复聊天界面
      if (!keyword.trim()) {
        searchBox.style.display = 'none';
        chatBox.style.display = 'block';
        return;
      }

      if (!serverIP) return alert("请先连接服务器！");

      try {
        const response = await fetch(`http://${serverIP}:${SERVER_PORT}/search?keyword=${encodeURIComponent(keyword)}`);
        const res = await response.json();

        if (res.status === "success") {
          // 切换到搜索结果视图
          chatBox.style.display = 'none';
          searchBox.style.display = 'block';

          // 渲染搜索结果头部
          searchBox.innerHTML = `<div style="font-size: 13px; color: #666; margin-bottom: 10px;">
            🎯 穿越时空：找到 ${res.count} 条关于 "<span style="color:red; font-weight:bold">${keyword}</span>" 的记录
          </div>`;

          // 无结果提示
          if (res.count === 0) {
            searchBox.innerHTML += `<div style="text-align: center; color: #999; margin-top: 20px;">空空如也 🍃</div>`;
            return;
          }

          // 遍历渲染搜索结果
          res.data.forEach(msg => {
            const div = document.createElement('div');
            div.className = `message ${msg.msg_type === 'file' ? 'file-msg' : ''}`;
            div.style.borderLeft = "4px solid #ff9800";

            // 关键词高亮函数
            const highlightText = (text) => {
              if (!text) return "";
              const safeKeyword = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const regex = new RegExp(`(${safeKeyword})`, 'gi');
              return text.replace(regex, `<span class="highlight">$1</span>`);
            };

            // 区分文本/文件消息渲染
            if (msg.msg_type === 'text') {
              div.innerHTML = `💬: ${highlightText(msg.content)}`;
            } else if (msg.msg_type === 'file') {
              const url = `http://${serverIP}:${SERVER_PORT}${msg.download_url}`;
              div.innerHTML = `📁: ${highlightText(msg.filename)} <br><a class="file-link" href="${url}" target="_blank">⬇️ 点击下载</a>`;
            }

            searchBox.appendChild(div);
          });
        }
      } catch (error) {
        console.error("搜索链路断裂:", error);
      }
    }

    // 包装防抖函数（延迟500ms）
    const debouncedSearch = debounce((e) => performSearch(e.target.value), 500);

    // ================= 局域网雷达探测引擎 =================
    async function scanNetwork() {
      const subnet = document.getElementById('subnet-input').value.trim();
      if (!subnet) return alert("请输入网段！");

      const serverList = document.getElementById('server-list');
      const scanBtn = document.getElementById('scan-btn');

      // 初始化扫描UI
      serverList.innerHTML = "<div style='color: #666;'>📡 正在向 254 个 IP 发射探测信号，请稍候...</div>";
      scanBtn.disabled = true;
      scanBtn.innerText = "扫描中...";

      const foundServers = [];
      const promises = [];

      // 生成所有IP的探测Promise
      for (let i = 1; i <= 254; i++) {
        promises.push(pingServer(`${subnet}.${i}`, foundServers));
      }

      // 等待所有探测完成（无论成功/失败）
      await Promise.allSettled(promises);

      // 渲染扫描结果
      serverList.innerHTML = "";
      if (foundServers.length === 0) {
        serverList.innerHTML = "<div style='color: red;'>❌ 未找到服务器，请确认网段是否正确，或检查服务器防火墙设置。</div>";
      } else {
        foundServers.forEach(server => {
          const btn = document.createElement('button');
          btn.style.cssText = "background: #28a745; color: white; padding: 10px; border-radius: 8px; text-align: left;";
          btn.innerHTML = `💻 <b>${server.name}</b> <br><span style="font-size: 12px; color: #e8e8e8;">IP: ${server.ip}</span>`;
          btn.onclick = () => connectServer(server.ip);
          serverList.appendChild(btn);
        });
      }

      // 恢复扫描按钮状态
      scanBtn.disabled = false;
      scanBtn.innerText = "重新扫描";
    }

    async function pingServer(ip, foundServers) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 2500);

      try {
        const response = await fetch(`http://${ip}:${SERVER_PORT}/ping`, {
          signal: controller.signal,
          mode: 'cors'
        });

        if (response.ok) {
          const data = await response.json();
          foundServers.push({ ip: ip, name: data.server_name });
        }
      } catch (e) {
        // 忽略单个IP探测失败（正常现象）
      } finally {
        clearTimeout(timeoutId);
      }
    }
  </script>
</body>
</html>
